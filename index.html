<!doctype html>
<html lang="en">
  <head>
    <script>
      // Safely patch window.fetch with a custom getter/setter to prevent the
      // "Cannot set property fetch of #<Window> which has only a getter" TypeError
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { originalFetch = v; },
            configurable: true
          });
        } catch (e) {
          console.warn("Failed to patch window.fetch:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
